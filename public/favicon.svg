  <!-- r=2,l=0 --> <polygon points="122.4,163.2 103.6,172.5 103.6,153.8 122.4,144.5" fill="#F5F5F5"/>
  <!-- r=0,l=1 --> <polygon points="174.4,111.2 155.6,120.5 155.6,101.8 174.4,92.5"  fill="#F5F5F5"/>
  <!-- r=1,l=1 --> <polygon points="148.4,124.2 129.6,133.5 129.6,114.8 148.4,105.5" fill="#F5F5F5"/>
  <!-- r=2,l=1 --> <polygon points="122.4,137.2 103.6,146.5 103.6,127.8 122.4,118.5" fill="#F5F5F5"/>
  <!-- r=0,l=2 --> <polygon points="174.4,85.2 155.6,94.5 155.6,75.8 174.4,66.5"    fill="#F5F5F5"/>
  <!-- r=1,l=2 --> <polygon points="148.4,98.2 129.6,107.5 129.6,88.8 148.4,79.5"  fill="#F5F5F5"/>
  <!-- r=2,l=2 --> <polygon points="122.4,111.2 103.6,120.5 103.6,101.8 122.4,92.5" fill="#F5F5F5"/>

  <!-- ======== TOP FACE (l=3) - Yellow ======== -->
  <!-- Cubie background polygons (top, right, bottom, left) -->
  <!-- c=0,r=0 --> <polygon points="100,22 126,35 100,48 74,35"   fill="#1a1a1a" stroke="#000" stroke-width="1.5"/>
  <!-- c=1,r=0 --> <polygon points="126,35 152,48 126,61 100,48"  fill="#1a1a1a" stroke="#000" stroke-width="1.5"/>
  <!-- c=2,r=0 --> <polygon points="152,48 178,61 152,74 126,61"  fill="#1a1a1a" stroke="#000" stroke-width="1.5"/>
