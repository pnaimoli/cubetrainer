<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!--
    Isometric 3x3 Rubik's cube.

    Coordinate system: unit U=26, half=13, center=(100,100)
      iso(c, r, l): x = 100 + 26c - 26r
                    y = 100 + 13c + 13r - 26l

    Three visible faces:
      TOP   (l=3): cubie(c,r) for c,r in 0..2
      RIGHT (c=3): cubie(r,l) for r,l in 0..2
      LEFT  (r=3): cubie(c,l) for c,l in 0..2

    Cube bounding box: x=[22,178], y=[22,178] (22px margin in 200x200)

    Stickers inset with factor 0.72 from each cubie face center.
  -->

  <!-- ======== LEFT FACE (r=3) - Orange ======== -->
  <!-- Cubie background polygons (BL, BR, TR, TL) -->
  <!-- c=0,l=0 --> <polygon points="22,139 48,152 48,126 22,113" fill="#1a1a1a" stroke="#000" stroke-width="1.5"/>
  <!-- c=1,l=0 --> <polygon points="48,152 74,165 74,139 48,126" fill="#1a1a1a" stroke="#000" stroke-width="1.5"/>
  <!-- c=2,l=0 --> <polygon points="74,165 100,178 100,152 74,139" fill="#1a1a1a" stroke="#000" stroke-width="1.5"/>
  <!-- c=0,l=1 --> <polygon points="22,113 48,126 48,100 22,87"  fill="#1a1a1a" stroke="#000" stroke-width="1.5"/>
  <!-- c=1,l=1 --> <polygon points="48,126 74,139 74,113 48,100" fill="#1a1a1a" stroke="#000" stroke-width="1.5"/>
  <!-- c=2,l=1 --> <polygon points="74,139 100,152 100,126 74,113" fill="#1a1a1a" stroke="#000" stroke-width="1.5"/>
  <!-- c=0,l=2 --> <polygon points="22,87 48,100 48,74 22,61"   fill="#1a1a1a" stroke="#000" stroke-width="1.5"/>
  <!-- c=1,l=2 --> <polygon points="48,100 74,113 74,87 48,74"  fill="#1a1a1a" stroke="#000" stroke-width="1.5"/>
  <!-- c=2,l=2 --> <polygon points="74,113 100,126 100,100 74,87" fill="#1a1a1a" stroke="#000" stroke-width="1.5"/>

  <!-- Left face stickers (orange) -->
  <!-- c=0,l=0 --> <polygon points="25.6,137.2 44.4,146.5 44.4,127.8 25.6,118.5" fill="#EA3323"/>
  <!-- c=1,l=0 --> <polygon points="51.6,150.2 70.4,159.5 70.4,140.8 51.6,131.5" fill="#EA3323"/>
  <!-- c=2,l=0 --> <polygon points="77.6,163.2 96.4,172.5 96.4,153.8 77.6,144.5" fill="#EA3323"/>
  <!-- c=0,l=1 --> <polygon points="25.6,111.2 44.4,120.5 44.4,101.8 25.6,92.5"  fill="#EA3323"/>
  <!-- c=1,l=1 --> <polygon points="51.6,124.2 70.4,133.5 70.4,114.8 51.6,105.5" fill="#EA3323"/>
  <!-- c=2,l=1 --> <polygon points="77.6,137.2 96.4,146.5 96.4,127.8 77.6,118.5" fill="#EA3323"/>
  <!-- c=0,l=2 --> <polygon points="25.6,85.2 44.4,94.5 44.4,75.8 25.6,66.5"    fill="#EA3323"/>
  <!-- c=1,l=2 --> <polygon points="51.6,98.2 70.4,107.5 70.4,88.8 51.6,79.5"  fill="#EA3323"/>
  <!-- c=2,l=2 --> <polygon points="77.6,111.2 96.4,120.5 96.4,101.8 77.6,92.5" fill="#EA3323"/>

