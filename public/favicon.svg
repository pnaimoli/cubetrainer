  <!-- c=2,r=1 --> <polygon points="126,61 152,74 126,87 100,74"  fill="#1a1a1a" stroke="#000" stroke-width="1.5"/>
  <!-- c=0,r=2 --> <polygon points="48,48 74,61 48,74 22,61"      fill="#1a1a1a" stroke="#000" stroke-width="1.5"/>
  <!-- c=1,r=2 --> <polygon points="74,61 100,74 74,87 48,74"     fill="#1a1a1a" stroke="#000" stroke-width="1.5"/>
  <!-- c=2,r=2 --> <polygon points="100,74 126,87 100,100 74,87"  fill="#1a1a1a" stroke="#000" stroke-width="1.5"/>

  <!-- Top face stickers (yellow) -->
  <!-- c=0,r=0 --> <polygon points="100,25.6 118.7,35 100,44.4 81.3,35"   fill="#7BEB47"/>
  <!-- c=1,r=0 --> <polygon points="126,38.6 144.7,48 126,57.4 107.3,48"  fill="#7BEB47"/>
  <!-- c=2,r=0 --> <polygon points="152,51.6 170.7,61 152,70.4 133.3,61"  fill="#7BEB47"/>
  <!-- c=0,r=1 --> <polygon points="74,38.6 92.7,48 74,57.4 55.3,48"      fill="#7BEB47"/>
  <!-- c=1,r=1 --> <polygon points="100,51.6 118.7,61 100,70.4 81.3,61"   fill="#7BEB47"/>
  <!-- c=2,r=1 --> <polygon points="126,64.6 144.7,74 126,83.4 107.3,74"  fill="#7BEB47"/>
  <!-- c=0,r=2 --> <polygon points="48,51.6 66.7,61 48,70.4 29.3,61"      fill="#7BEB47"/>
  <!-- c=1,r=2 --> <polygon points="74,64.6 92.7,74 74,83.4 55.3,74"      fill="#7BEB47"/>
  <!-- c=2,r=2 --> <polygon points="100,77.6 118.7,87 100,96.4 81.3,87"   fill="#7BEB47"/>

</svg>
